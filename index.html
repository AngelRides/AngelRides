<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AngelRides - Documentos Legales</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0425E0, #00BFFF);
            color: white;
            text-align: center;
            padding: 50px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            color: #0425E0;
            padding: 30px;
            border-radius: 15px;
            width: 250px;
            text-decoration: none;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .card h2 {
            margin: 0 0 15px 0;
            font-size: 1.8em;
        }
        .card p {
            color: #333;
            margin: 0;
            font-size: 0.9em;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪽 AngelRides</h1>
        <div class="subtitle">Documentos Legales Oficiales</div>
        
        <div class="links">
            <a href="privacy.html" class="card">
                <h2>🔐 Privacidad</h2>
                <p>Política de Privacidad para Conductores y Pasajeros</p>
            </a>

                <p>Términos y Condiciones de uso de la Plataforma</p>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 AngelRides. Todos los derechos reservados.</p>
            <p>Última actualización: 12 de marzo de 2026</p>
        </div>
    </div>
</body>
